    <article class="wiki-main">
      <h1>1d100 판정</h1>
      <div class="subhead">
        <span>§4</span><span>·</span><span>읽기 약 6분</span><span>·</span><span class="tag-pill accent">자주 쓰임</span>
      </div>

      <div class="wiki-section">
        <h2>4.1 판정 단계 <span class="anchor">#levels</span> <span class="en">Difficulty Levels</span></h2>
        <p>
          Call of Cthulhu의 모든 능력·기능 판정은 <b>d100</b>을 굴려 기능치와 비교합니다.
          지옥도에서는 본문에 <code>/cc [이름] 기능치</code> 한 줄을 적어 굴립니다.
          예) <code>/cc 도서관 이용 85</code>
        </p>
        <div class="wiki-callout">
          <b>핵심 ─</b> 굴림은 항상 d100. 기능치는 1~100 사이 정수.
          기능치를 기준으로 5단계 결과로 나뉩니다.
        </div>
        <table class="wiki-table">
          <thead>
            <tr><th>단계</th><th>조건</th><th>예 (기능치 60)</th><th>의미</th></tr>
          </thead>
          <tbody>
            <tr><td>결정적 성공</td><td>굴림 = 1</td><td>1</td><td>최고 결과·서술 보너스</td></tr>
            <tr><td>극단적 성공</td><td>굴림 ≤ 기능치 / 5</td><td>2 ~ 12</td><td>큰 성공·정보 +1</td></tr>
            <tr><td>어려운 성공</td><td>굴림 ≤ 기능치 / 2</td><td>13 ~ 30</td><td>난이도 높은 상황 통과</td></tr>
            <tr><td>일반 성공</td><td>굴림 ≤ 기능치</td><td>31 ~ 60</td><td>보통 성공</td></tr>
            <tr><td>실패</td><td>굴림 &gt; 기능치</td><td>61 ~ 99</td><td>실패</td></tr>
            <tr><td>펌블</td><td>기능치 &lt; 50 일 때 96~100<br/>그 외 100</td><td>96 ~ 100</td><td>심각한 부작용</td></tr>
          </tbody>
        </table>
      </div>

      <div class="wiki-section">
        <h2>4.2 어려운·극단적 굴림 <span class="anchor">#hard-extreme</span> <span class="en">Hard / Extreme Rolls</span></h2>
        <p>
          상황에 따라 키퍼가 <b>어려운</b>이나 <b>극단적</b> 굴림을 요구할 수 있습니다.
          이때는 단계별 임계값을 통과해야만 성공합니다.
        </p>
        <div class="dice-block cc">
          <span class="label">CoC 판정</span>
          <span class="expr">도서관 이용 (어려운)</span>
          <span class="expr">1d100 ≤ 42</span>
          <span class="total">→ 27</span>
          <span class="level hard">어려운 성공</span>
        </div>
        <p style="margin-top: 0.85rem">
          지옥도에서 어려운/극단적 굴림은 키퍼가 본문에 표시하는 방식을 권장합니다.
          판정 결과 자체는 단계가 자동 계산되어 위 다이스 블록으로 표시됩니다.
        </p>
        <div class="wiki-callout">
          <b>키퍼 노트 ─</b> 한 판정에 여러 단계를 동시에 표시할 수도 있습니다.
          예: 「열쇠를 열려면 잠금장치 일반, 시간 안에 열려면 어려운」.
        </div>
      </div>

      <div class="wiki-section">
        <h2>4.3 결정적 성공과 펌블 <span class="anchor">#crit-fumble</span> <span class="en">Critical &amp; Fumble</span></h2>
        <p>판정에서 가장 극단적인 두 결과입니다. 키퍼는 서술적 보너스/페널티를 부여하세요.</p>
        <ul>
          <li><b>결정적 성공</b> — 굴림이 정확히 <code>1</code>. 단계와 무관하게 최상위 결과.</li>
          <li><b>펌블</b> — 기능치 50 미만이면 96~100, 50 이상이면 정확히 100.</li>
        </ul>
        <div class="dice-block cc">
          <span class="label">CoC 판정</span>
          <span class="expr">청각</span>
          <span class="expr">1d100 ≤ 60</span>
          <span class="total">→ 1</span>
          <span class="level critical">결정적 성공</span>
        </div>
      </div>
    </article>

    <aside class="wiki-aside">

</script>

<script>
(() => {
  // ──── Routing ─────────────────────────────────────────────────────
  const screen = document.getElementById("screen");
  const routes = ["home","rulebook","sheet","statblock","session","search","dashboard"];
  let peekAbort = null;
  let tickerInterval = null;

  function getRoute() {
    const h = location.hash.replace(/^#/, "");
    return routes.includes(h) ? h : "home";
  }

  function render() {
    const r = getRoute();
    const tpl = document.getElementById("screen-" + r);
    if (!tpl) return;
    screen.innerHTML = tpl.textContent;
    document.title = "지옥도 — " + (tpl.dataset.label || "VTT 프로토타입");

    // update nav active state
    document.querySelectorAll("[data-route]").forEach(a => {
      a.classList.toggle("active", a.getAttribute("data-route") === r);
    });

    window.scrollTo({ top: 0, behavior: "instant" });

    // Mount per-screen behaviors
    if (r === "home") mountHome();
  }

  window.addEventListener("hashchange", render);

  // (initial render moved to bottom — needs PEEK_SCRIPT/TICKER declared first)

  // ──── Home: typing demo in the peek window ─────────────────────────
  const PEEK_SCRIPT = [
    { type: "narration", who: "키퍼 박", body: "안개가 짙어진다. 부두 끝, 등불 아래 검은 봉투가 떨어져 있다. 어떻게 행동할 텐가?" },
    { type: "input",     text: "/cc 탐색 50" },
    { type: "dice",      kind: "cc", name: "탐색", target: 50, roll: 23, level: "hard", who: "이도윤" },
    { type: "narration", who: "이도윤", body: "봉투를 집어 든다. 라틴어로 적힌 메모가 들어 있다…" },
    { type: "input",     text: "/cc 라틴어 50" },
    { type: "dice",      kind: "cc", name: "언어 (라틴)", target: 50, roll: 8,  level: "extreme", who: "이도윤" },
    { type: "narration", who: "키퍼 박", body: "「열한번째 밤, 항구 끝의 검은 입을 보라」 — 라는 구절이 명확히 읽힌다." },
    { type: "input",     text: "/cc 청각 35" },
    { type: "dice",      kind: "cc", name: "청각", target: 35, roll: 1, level: "critical", who: "박씨" },
  ];

  const LEVEL_LABEL = {
    critical: "결정적 성공",
    extreme:  "극단적 성공",
    hard:     "어려운 성공",
    regular:  "일반 성공",
    fail:     "실패",
    fumble:   "펌블",
  };

  function diceBlock(d) {
    return `
      <div class="dice-block cc">
        <span class="label">CoC 판정</span>
        <span class="expr">${d.name}</span>
        <span class="expr">1d100 ≤ ${d.target}</span>
        <span class="total">→ ${d.roll}</span>
        <span class="level ${d.level}">${LEVEL_LABEL[d.level]}</span>
      </div>
    `;
  }

  function turnNarration(t) {
    return `
      <div class="narration">
        <div style="font-size:0.74rem; color:var(--gold); font-weight:700; margin-bottom:0.2rem">${t.who}</div>
        ${t.body}
      </div>
    `;
  }

  function mountHome() {
    const feed = document.getElementById("peek-feed");
    const typingEl = document.getElementById("peek-typing");
    if (!feed || !typingEl) return;

    if (peekAbort) peekAbort();
    let stopped = false;
    peekAbort = () => { stopped = true; };

    feed.innerHTML = "";
    typingEl.textContent = "";
    let i = 0;

    const sleep = ms => new Promise(r => setTimeout(r, ms));

    async function run() {
      while (!stopped) {
        const step = PEEK_SCRIPT[i % PEEK_SCRIPT.length];
        if (step.type === "narration") {
          appendNarration(step);
        } else if (step.type === "input") {
          await typeInto(typingEl, step.text);
          if (stopped) return;
          await sleep(350);
          typingEl.textContent = "";
        } else if (step.type === "dice") {
          feed.insertAdjacentHTML("beforeend", diceBlock(step));
          trimFeed();
        }
        i++;
        await sleep(step.type === "narration" ? 1900 : 900);
        if (stopped) return;
      }
    }

    async function typeInto(el, text) {
      el.textContent = "";
      for (const ch of text) {
        if (stopped) return;
        el.textContent += ch;
        await sleep(48 + Math.random() * 40);
      }
    }

    function appendNarration(t) {
      feed.insertAdjacentHTML("beforeend", turnNarration(t));
      trimFeed();
    }

    function trimFeed() {
      while (feed.children.length > 4) feed.firstElementChild.remove();
      feed.scrollTop = feed.scrollHeight;
    }

    // also start the live ticker
    mountTicker();

    run();
  }

  // ──── Live ticker ─────────────────────────────────────────────────
  const TICKER = [
    { who: "이도윤",   what: "탐색", code: "/cc 탐색 50",     result: "→ 23 어려운 성공", lvl: "hard"     },
    { who: "박씨",     what: "청각", code: "/cc 청각 60",     result: "→ 03 결정적!",     lvl: "critical" },
    { who: "윤상호",   what: "권총", code: "/cc 권총 30",     result: "→ 84 실패",         lvl: "fail"     },
    { who: "키퍼 김",  what: "굴림", code: "/roll 3d6",      result: "→ [4,5,6] = 15",   lvl: ""         },
    { who: "지윤",     what: "회피", code: "/cc 회피 32",     result: "→ 12 어려운 성공", lvl: "hard"     },
    { who: "민혁",     what: "SAN",  code: "/cc SAN 55",     result: "→ 100 펌블…",       lvl: "fumble"   },
    { who: "수아",     what: "도서관", code: "/cc 도서관 85", result: "→ 17 극단적 성공", lvl: "extreme"  },
    { who: "키퍼 박",  what: "굴림", code: "/roll 1d6+2",    result: "→ 7 피해",          lvl: ""         },
    { who: "현우",     what: "응급", code: "/cc 응급처치 40", result: "→ 28 일반 성공",   lvl: "regular"  },
  ];

  function mountTicker() {
    const feed = document.getElementById("ticker-feed");
    const count = document.getElementById("ticker-count");
    if (!feed) return;
    feed.innerHTML = "";
    let n = 847;
    let idx = 0;

    function tick() {
      const row = TICKER[idx % TICKER.length];
      idx++;
      n++;
      if (count) count.textContent = `${n.toLocaleString()}개 · 오늘`;
      const html = `
        <div class="row">
          <span class="who">${row.who}</span>
          <span class="body">${row.what} · <code>${row.code}</code> ${row.result}</span>
          <span class="when">방금</span>
        </div>`;
      feed.insertAdjacentHTML("afterbegin", html);
      while (feed.children.length > 5) feed.lastElementChild.remove();
    }

    if (tickerInterval) clearInterval(tickerInterval);
    tick(); tick(); tick(); tick();
    tickerInterval = setInterval(tick, 2400);
  }

  // Kick off initial render now that all module-level const/let are initialised.
  render();
})();
</script>
